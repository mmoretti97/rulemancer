<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Rulemancer - List Rooms</title>
		<style>
			:root {
				color-scheme: light;
			}

			body {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				margin: 24px;
				color: #1e1e1e;
			}

			h3 {
				margin: 0 0 16px 0;
			}

			button {
				padding: 10px 16px;
				border: 1px solid #2f3b52;
				background: #2f3b52;
				color: #ffffff;
				border-radius: 6px;
				cursor: pointer;
			}

			button:disabled {
				opacity: 0.6;
				cursor: not-allowed;
			}

			#status {
				margin: 12px 0;
				font-size: 14px;
				color: #4a4a4a;
			}

			#results {
				border: 1px solid #d0d7de;
				border-radius: 6px;
				padding: 12px;
				min-height: 48px;
				background: #fafbfc;
			}

			ul {
				margin: 0;
				padding-left: 20px;
			}
		</style>
	</head>
	<body>
		<h3>List rooms</h3>
		<button id="query-button" type="button">Query</button>
		<div id="status" role="status"></div>
		<div id="results" aria-live="polite"></div>

		<script>
			(function () {
				const button = document.getElementById("query-button");
				const status = document.getElementById("status");
				const results = document.getElementById("results");

				function setStatus(message) {
					status.textContent = message;
				}

				function renderRooms(rooms) {
					results.textContent = "";
					if (!Array.isArray(rooms) || rooms.length === 0) {
						results.textContent = "No rooms found.";
						return;
					}

					const list = document.createElement("ul");
					rooms.forEach((room) => {
						const item = document.createElement("li");
						item.textContent = String(room);
						list.appendChild(item);
					});
					results.appendChild(list);
				}

				async function fetchRooms() {
					const jwt =
						window.RULEMANCER_JWT ||
						localStorage.getItem("rulemancer_jwt") ||
						"";

					if (!jwt) {
						setStatus("Missing JWT. Provide window.RULEMANCER_JWT or localStorage rulemancer_jwt.");
						results.textContent = "";
						return;
					}

					button.disabled = true;
					setStatus("Loading rooms...");
					results.textContent = "";

					try {
						const response = await fetch("/api/v1/room/list", {
							method: "GET",
							headers: {
								Authorization: "Bearer " + jwt,
							},
						});

						const text = await response.text();
						let payload = {};
						if (text) {
							try {
								payload = JSON.parse(text);
							} catch (error) {
								throw new Error("Invalid JSON response");
							}
						}

						if (!response.ok) {
							const message = payload.error || payload.message || response.statusText;
							throw new Error(message || "Request failed");
						}

						setStatus("Rooms loaded.");
						renderRooms(payload.rooms || []);
					} catch (error) {
						setStatus("Error: " + error.message);
						results.textContent = "";
					} finally {
						button.disabled = false;
					}
				}

				button.addEventListener("click", fetchRooms);
			})();
		</script>
	</body>
</html>
